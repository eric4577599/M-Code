<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>瓦楞箱條碼 QC 核心 — 互動測試台</title>
<style>
  :root { --ok:#1f9d55; --warn:#d97706; --fail:#dc2626; --ink:#111827; --mut:#6b7280; --line:#e5e7eb; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", system-ui, sans-serif; color:var(--ink); background:#f3f4f6; }
  header { background:#0f172a; color:#e2e8f0; padding:14px 20px; }
  header h1 { font-size:17px; margin:0; }
  header p { margin:4px 0 0; font-size:12px; color:#94a3b8; }
  .wrap { display:grid; grid-template-columns: 360px 1fr; gap:16px; padding:16px; align-items:start; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:14px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--mut); margin:0 0 10px; }
  label { display:flex; justify-content:space-between; align-items:center; font-size:13px; margin:7px 0; gap:8px; }
  label span.v { font-family: ui-monospace, "Consolas", monospace; color:var(--mut); min-width:48px; text-align:right; }
  input[type=range] { width:150px; }
  input[type=text], input[type=number], select { font:inherit; padding:4px 6px; border:1px solid var(--line); border-radius:6px; width:150px; }
  button { background:#0f172a; color:#fff; border:0; border-radius:8px; padding:10px 16px; font-size:14px; cursor:pointer; width:100%; margin-top:6px; }
  button:hover { background:#1e293b; }
  .lights { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .light { border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px; text-align:center; }
  .light .dot { width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:5px; vertical-align:middle; }
  .OK { background:var(--ok); } .WARN { background:var(--warn); } .FAIL { background:var(--fail); }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .state-ARMED { color:var(--ok); } .state-LOCKED { color:var(--fail); } .state-SCANNING { color:var(--mut); }
  .grade-circle { width:120px; height:120px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto; border:8px solid var(--ok); }
  .grade-circle .letter { font-size:46px; font-weight:800; line-height:1; }
  .grade-circle .sub { font-size:10px; color:var(--mut); }
  .legal { color:var(--fail); font-size:11px; text-align:center; margin-top:6px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  td, th { padding:5px 6px; border-bottom:1px solid var(--line); text-align:left; }
  .tag { font-size:10px; padding:1px 6px; border-radius:4px; }
  .tag.GEOMETRIC { background:#dcfce7; color:#166534; }
  .tag.PHOTOMETRIC { background:#fef3c7; color:#92400e; }
  .quad { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .quad div { border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px; }
  .quad b { display:block; font-family:ui-monospace,monospace; font-size:15px; }
  .diag { border-left:4px solid var(--warn); background:#fffbeb; padding:8px 10px; border-radius:6px; margin:6px 0; font-size:13px; }
  .diag.sev3 { border-left-color:var(--fail); background:#fef2f2; }
  .csv { font-family:ui-monospace,monospace; font-size:11px; word-break:break-all; background:#0f172a; color:#86efac; padding:10px; border-radius:8px; }
  .accept-pass { color:var(--ok); font-weight:700; } .accept-fail { color:var(--fail); font-weight:700; }
  .muted { color:var(--mut); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>瓦楞箱條碼 / QR 品質檢驗 — 核心引擎互動測試台</h1>
  <p>調整輸入 → 跑完整 pipeline（C4 閘門 → C5 解碼 → C6 量測 → C7 分級 → C8 診斷 → 驗收 → CSV）。所有數值由核心庫即時運算。</p>
</header>
<div class="wrap">
  <!-- ───────── Inputs ───────── -->
  <div>
    <div class="card">
      <h2>工單 / 製程</h2>
      <label>符號別 <select id="symbology"><option>ITF14</option><option>GS1_128</option></select></label>
      <label>基準檔（楞型）<select id="profile"></select></label>
      <label>驗收政策 <select id="policy"></select></label>
      <label>解碼字串 <input type="text" id="decoded" value="104712345678904" /></label>
      <label>預期 GTIN <input type="text" id="expected" value="104712345678904" /></label>
      <label>可解碼 <input type="checkbox" id="canDecode" checked /></label>
    </div>
    <div class="card">
      <h2>C4 拍攝品質閘門</h2>
      <label>對焦 varLap <input type="range" id="varLap" min="0" max="300" value="200"><span class="v" id="varLap_v"></span></label>
      <label>眩光 glare% <input type="range" id="glare" min="0" max="10" step="0.1" value="0.5"><span class="v" id="glare_v"></span></label>
      <label>楞痕 ampRatio <input type="range" id="wash" min="0" max="0.3" step="0.01" value="0.06"><span class="v" id="wash_v"></span></label>
      <label>白平衡 Δgain% <input type="range" id="wb" min="0" max="15" step="0.5" value="3"><span class="v" id="wb_v"></span></label>
      <label>印向夾角° <input type="range" id="picket" min="0" max="30" value="4"><span class="v" id="picket_v"></span></label>
      <label>透視傾斜° <input type="range" id="tilt" min="0" max="15" value="3"><span class="v" id="tilt_v"></span></label>
      <label>px/module <input type="range" id="pxm" min="0" max="15" value="9"><span class="v" id="pxm_v"></span></label>
      <label>比例尺卡偵測 <input type="checkbox" id="scaleRef" checked /></label>
    </div>
    <div class="card">
      <h2>C7 分級 proxy / C6 量測</h2>
      <label>R_light <input type="range" id="rLight" min="0" max="1" step="0.01" value="0.8"><span class="v" id="rLight_v"></span></label>
      <label>R_dark <input type="range" id="rDark" min="0" max="1" step="0.01" value="0.2"><span class="v" id="rDark_v"></span></label>
      <label>最小邊緣對比 <input type="range" id="edge" min="0" max="1" step="0.01" value="0.55"><span class="v" id="edge_v"></span></label>
      <label>條寬偏差/容差 <input type="range" id="dec" min="0" max="1" step="0.01" value="0.4"><span class="v" id="dec_v"></span></label>
      <label>元素反射不均(DEF) <input type="range" id="def" min="0" max="1" step="0.01" value="0.3"><span class="v" id="def_v"></span></label>
      <label>條寬增益 BWR mm <input type="number" id="bwr" step="0.01" value="0.08"></label>
    </div>
    <button id="run">▶ 檢驗（跑 pipeline）</button>
  </div>

  <!-- ───────── Outputs ───────── -->
  <div>
    <div class="card">
      <h2>拍攝閘門 — 狀態 <span id="gateState" class="pill"></span></h2>
      <div class="lights" id="lights"></div>
      <p class="muted" id="gateNote"></p>
    </div>
    <div class="card" id="resultCard" style="display:none">
      <h2>結果 — 解碼 <span id="decodeStatus"></span></h2>
      <div class="grade-circle" id="circle">
        <div class="letter" id="gradeLetter">–</div>
        <div class="sub">參考等級</div>
      </div>
      <div class="legal">相對值・非 ISO 合規證書（本工具不出具 ISO 證書）</div>
      <p style="text-align:center; margin:8px 0;">驗收門檻 ≥ <b id="reqGrade"></b>：
        <span id="acceptResult"></span>（margin <span id="margin"></span>）</p>
      <h2 style="margin-top:14px">分級參數</h2>
      <table id="params"></table>
      <h2 style="margin-top:14px">尺寸量測</h2>
      <div class="quad" id="quad"></div>
      <h2 style="margin-top:14px">印刷掉級診斷</h2>
      <div id="diagnosis"></div>
      <h2 style="margin-top:14px">CSV（C9.4）</h2>
      <div class="csv" id="csv"></div>
    </div>
  </div>
</div>

<script type="module">
import {
  evaluateGate, runDecode, buildMeasurement, buildGradeResult,
  evaluateDiagnosis, evaluateAcceptance, toCsvRow,
  SEED_DIAGNOSIS_RULES, SEED_SUBSTRATE_PROFILES, SEED_ACCEPTANCE_POLICIES,
} from "../dist/index.js";

const $ = (id) => document.getElementById(id);
const GRADE_COLOR = { A:"#1f9d55", B:"#65a30d", C:"#d97706", D:"#dc2626", F:"#991b1b" };

// populate profile / policy selectors from seed data
SEED_SUBSTRATE_PROFILES.forEach(p => $("profile").add(new Option(p.name, p.id)));
SEED_ACCEPTANCE_POLICIES.forEach(p => $("policy").add(new Option(`${p.id} (≥${p.requiredGrade})`, p.id)));

// live range value labels
const ranges = ["varLap","glare","wash","wb","picket","tilt","pxm","rLight","rDark","edge","dec","def"];
ranges.forEach(id => {
  const upd = () => { const el = $(id+"_v"); if (el) el.textContent = $(id).value; };
  $(id).addEventListener("input", upd); upd();
});

function run() {
  const symbology = $("symbology").value;
  const profile = SEED_SUBSTRATE_PROFILES.find(p => p.id === $("profile").value);
  const policy = SEED_ACCEPTANCE_POLICIES.find(p => p.id === $("policy").value);

  // ── C4 gate ──
  const gate = evaluateGate({
    symbolDetected: true,
    varLap: +$("varLap").value,
    glareRatio: +$("glare").value / 100,
    washboardAmpRatio: +$("wash").value,
    wbGainDeviation: +$("wb").value / 100,
    scaleRefDetected: $("scaleRef").checked,
    picketAngleDeg: +$("picket").value,
    perspectiveTiltDeg: +$("tilt").value,
    gsdMmPerPx: 0.12,
    pxPerModule: +$("pxm").value,
  });

  // gate UI
  $("gateState").textContent = gate.state;
  $("gateState").className = "pill state-" + gate.state;
  $("lights").innerHTML = gate.report.checks.map(c =>
    `<div class="light"><span class="dot ${c.status}"></span>${c.key}<br><span class="muted">${c.status} · ${(+c.value).toFixed?.(2) ?? c.value}</span></div>`
  ).join("");
  $("gateNote").textContent = gate.state === "LOCKED"
    ? "有 FAIL 項 → 快門鎖死，無法檢驗（強制每次拍攝條件一致）。"
    : "全綠/黃 → 快門解鎖。WARN 仍可拍但數值會標註。";

  if (gate.state === "LOCKED") { $("resultCard").style.display = "none"; return; }

  // ── C5 decode ──
  const canDecode = $("canDecode").checked;
  const decoder = { decode: () => canDecode ? { symbology, data: $("decoded").value } : null };
  const decode = runDecode(decoder, { declaredSymbology: symbology, handle: {} }, { expectedGtin: $("expected").value });

  // ── C6 measurement ──
  const measurement = buildMeasurement({
    scaleRef: { type:"CARD", nominalMm:26, resolvedPx:260 },
    narrowestElementPx: 11, quietZonePixels: 110,
    measuredBarWidthMm: 1.016 + +$("bwr").value, nominalBarWidthMm: 1.016,
    washboardPeriodMm: 7.4, washboardAmplitudeRatio: +$("wash").value,
    expectedFlutePitchMm: profile.expectedFlutePitchMm,
  });

  // ── C7 grade (1D: 10 scanlines) ──
  const scan = () => ({
    photometric: { rLight:+$("rLight").value, rDark:+$("rDark").value, rDarkMin:+$("rDark").value, edgeContrasts:[+$("edge").value] },
    geometric: { maxWidthDeviation:+$("dec").value, tolerance:1, maxElementReflectanceNonUniformity:+$("def").value },
  });
  const grade = buildGradeResult(symbology, Array.from({length:10}, scan));

  // ── C8 diagnosis ──
  const metrics = { barWidthGainMm:+$("bwr").value, quietZoneX:measurement.quietZoneX, decoded: decode.decoded?1:0 };
  grade.parameters.forEach(p => metrics[`${p.code}.score`] = p.score);
  const diagnosis = evaluateDiagnosis(SEED_DIAGNOSIS_RULES, { symbology, substrateCategory: profile.category, metrics });

  // ── acceptance ──
  const acceptance = evaluateAcceptance(grade, policy);

  // ── render results ──
  $("resultCard").style.display = "block";
  $("decodeStatus").innerHTML = decode.decoded
    ? `<span style="color:var(--ok)">✓ 成功</span> · ${decode.data} · 比對 ${decode.expectedDataMatch ? "符合" : "不符"}`
    : `<span style="color:var(--fail)">✗ 不可讀</span>`;

  $("gradeLetter").textContent = grade.overall;
  $("circle").style.borderColor = GRADE_COLOR[grade.overall];
  $("gradeLetter").style.color = GRADE_COLOR[grade.overall];
  $("reqGrade").textContent = policy.requiredGrade;
  $("acceptResult").innerHTML = acceptance.pass
    ? '<span class="accept-pass">通過</span>' : '<span class="accept-fail">未通過</span>';
  $("margin").textContent = acceptance.marginScore.toFixed(2);

  $("params").innerHTML = "<tr><th>等級</th><th>參數</th><th>分數</th><th>類別</th></tr>" +
    grade.parameters.map(p =>
      `<tr><td style="color:${GRADE_COLOR[p.letter]};font-weight:700">${p.letter}</td><td>${p.label} (${p.code})</td><td>${p.score.toFixed(2)}</td><td><span class="tag ${p.kind}">${p.kind==="GEOMETRIC"?"幾何·穩":"光線·相對"}</span></td></tr>`
    ).join("");

  $("quad").innerHTML = `
    <div>X-dimension<b>${measurement.xDimMm.toFixed(3)} mm</b></div>
    <div>條寬增益 BWR<b>${(measurement.barWidthGainMm??0).toFixed(3)} mm</b></div>
    <div>Quiet Zone<b>${measurement.quietZoneX.toFixed(1)} X</b></div>
    <div>楞痕週期<b>${measurement.washboard?.periodMm?.toFixed(1) ?? "–"} mm ${measurement.washboard?.detected?"⚠":""}</b></div>`;

  $("diagnosis").innerHTML = diagnosis.matched.length
    ? diagnosis.matched.map(h => `<div class="diag sev${h.severity}"><b>[${h.ruleId}] ${h.cause}</b><br>處方：${h.remedy}（severity ${h.severity}）</div>`).join("")
    : '<p class="muted">無命中規則。</p>';

  const session = {
    id:"sess-demo", createdAt:new Date().toISOString(), plantId:"P1", lineId:"L3",
    processStage:"OUTBOUND", workOrderId:"WO-DEMO", substrateProfileId:profile.id,
    symbology, capture:gate.report, decode, measurement, grade, diagnosis, acceptance, syncState:"LOCAL",
  };
  $("csv").textContent = toCsvRow(session, { customer:"ACME" });
}

$("run").addEventListener("click", run);
run();
</script>
</body>
</html>
